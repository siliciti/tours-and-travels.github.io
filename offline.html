<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You are Offline — Tours and Travel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #fff; }
    p { font-size: 0.95rem; color: #94a3b8; line-height: 1.5; margin-bottom: 1.75rem; }
    .btn-group { display: flex; flex-direction: column; gap: 0.75rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: transform 150ms ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; border: none; cursor: pointer; }
    .btn-outline { background: rgba(255,255,255,0.08); color: #f8fafc; border: 1px solid rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>You are Currently Offline</h1>
    <p>It looks like your device is disconnected from the internet. You can still reach our 24/7 desk directly below or reload once reconnected.</p>
    <div class="btn-group">
      <button onclick="window.location.reload()" class="btn btn-primary">🔄 Retry Connection</button>
      <a href="tel:+919886267815" class="btn btn-outline">📞 Call 24/7 Support (+91 98862 67815)</a>
      <a href="https://wa.me/919886267815" class="btn btn-outline">💬 WhatsApp Us</a>
    </div>
  </div>
</body>
</html>
